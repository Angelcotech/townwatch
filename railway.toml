# Railway service configuration for the TownWatch ETL pipeline.
#
# Railway's railway.toml only supports config for ONE service per file
# (via [build] + [deploy]). Multi-service projects describe each
# service through the Railway UI or via its own railway.toml in a
# different rootDirectory. This file configures the primary daily-cron
# service.
#
# For ad-hoc batch jobs (extract_agendas_batch --submit, backfills,
# onboard_jurisdiction, etc.) create a second Railway service in the
# UI pointing at the same Dockerfile but without a cronSchedule. Invoke
# commands against it with:
#   railway run --service etl-jobs python -m townwatch_etl.jobs.<job> <args>
#
# Cron schedule: most US cities post agendas in the late morning / early
# afternoon local time, so a 06:00 UTC run (≈ 01:00 ET overnight) catches
# anything posted the previous business day before clerks come in the
# next morning.

[build]
builder = "DOCKERFILE"
dockerfilePath = "etl/Dockerfile"

[deploy]
startCommand = "python -m townwatch_etl.jobs.daily_refresh"
cronSchedule = "0 6 * * *"            # daily at 06:00 UTC

# Notes
# -----
# - The daily_refresh job picks up all jurisdictions in jurisdictions/*.json
#   automatically. Adding a new town requires no config change here.
# - All ETL secrets (DATABASE_URL, ANTHROPIC_API_KEY) live in Railway env
#   vars, never in this file.
# - Cron failures surface in pipeline_failure and on the admin/findings
#   queue, so a missed run is loudly visible to the operator.
