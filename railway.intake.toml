# Railway config for the correction-INTAKE service (townwatch-intake).
#
# Separate from railway.toml because that file configures the primary
# daily-cron worker (startCommand=daily_refresh + cronSchedule). The intake
# service is the opposite: a long-running HTTP server, no cron. Railway only
# allows ONE auto-detected config per repo (railway.toml), so this service
# must be pointed at this file explicitly via its Settings → Config-as-code →
# "Railway Config File" path = railway.intake.toml.
#
# Same Dockerfile/image as the worker; only the start command differs. The
# image installs townwatch_etl (pip install ./etl), so the module runs cleanly.
# Requires DATABASE_URL + INTAKE_TOKEN in the service's env vars (config.py
# reads DATABASE_URL at import time).
#
# Start via `python -m townwatch_etl.api` (NOT the bare `uvicorn ... --port
# $PORT` form): Railway exec's the start command without a shell, so a literal
# "$PORT" never gets expanded and uvicorn rejects it. api.main() reads the PORT
# env var in Python and launches uvicorn on 0.0.0.0:$PORT itself, sidestepping
# shell interpolation entirely.

[build]
builder = "DOCKERFILE"
dockerfilePath = "etl/Dockerfile"

[deploy]
startCommand = "python -m townwatch_etl.api"
# No cronSchedule: this is a persistent web service, not a scheduled job.
restartPolicyType = "ON_FAILURE"
